<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yamal Dinosaur Game</title>
    <link rel="stylesheet" href="flappybird.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background: #222;
            font-family: 'Press Start 2P', cursive;
        }
        
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        canvas {
            background: linear-gradient(to bottom, #70c5ce 0%, #70c5ce 70%, #ded895 70%, #ded895 100%);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        
        #ui {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            color: white;
            text-shadow: 2px 2px 0 #000;
            pointer-events: none;
        }
        
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.5);
            color: white;
            z-index: 10;
        }
        
        #overlay.hidden {
            display: none;
        }
        
        h1 { font-size: 40px; margin-bottom: 20px; color: #ffeb3b; }
        p { font-size: 20px; }
        .score-final { font-size: 30px; color: #4caf50; margin: 10px 0; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="board"></canvas>
        <div id="ui">
            <div id="score">SCORE: 0</div>
            <div id="high-score">BEST: 0</div>
        </div>
        <div id="overlay">
            <h1 id="title">YAMAL RUN</h1>
            <p id="message">PRESS ENTER TO START</p>
            <p style="font-size: 14px; margin-top: 20px; color: #eee;">[ SPACE ] TO JUMP</p>
            <div id="final-score-container" class="hidden">
                <div class="score-final" id="final-score">SCORE: 0</div>
            </div>
        </div>
    </div>
    
    <!-- Hidden Assets for Preloading -->
    <div style="display:none">
        <img id="yamal" src="images/Lamine-Yamal-12-removebg-preview.png">
        <img id="atm" src="images/atm.png">
        <img id="chelsea" src="images/england_chelsea_128x128.football-logos.cc.png">
        <img id="liverpool" src="images/liverpool.png">
        <img id="real-madrid" src="images/spain_real-madrid_128x128.football-logos.cc.png">
        <img id="bayern" src="images/germany_bayern-munchen_128x128.football-logos.cc.png">
        <img id="inter" src="images/italy_inter_128x128.football-logos.cc.png">
        <img id="dortmund" src="images/germany_borussia-dortmund_128x128.football-logos.cc.png">
        <img id="leverkusen" src="images/germany_bayer-leverkusen_128x128.football-logos.cc.png">
        <img id="valencia" src="images/spain_valencia_128x128.football-logos.cc.png">
        <img id="betis" src="images/spain_real-betis_128x128.football-logos.cc.png">
    </div>

    <script src="js.js"></script>
</body>
</html>
